<p-table
    [pt]="{ header: '!px-0 !pt-1' }"
    [scrollable]="true"
    [tableStyle]="{ 'min-width': '20rem' }"
    [value]="zonas()"
    scrollHeight="flex">

    <!-- Encabezado descriptivo -->
    <ng-template #caption>
        <app-alert description="Administración de regiones operativas, las zonas inhabilitadas no apareceran disponibles en los formularios de asignación de unidades" title="Administración de zonas"
                   type="info"></app-alert>
        <!-- Estadísticas -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 my-3">
            <app-stat-widget [title]="zonasActivas" color="green" icon="pi pi-arrow-up-right" subtitle="Zonas activas"/>
            <app-stat-widget [title]="zonasInactivas" color="red" icon="pi pi-arrow-circle-down"
                             subtitle="Zonas Inactivas"/>
            <app-stat-widget [title]="totalZonas" color="blue" icon="pi pi-map" subtitle="Totales"/>
        </div>

        <!-- Formulario superior -->
        <div class="flex flex-row gap-3 items-center">
            @if (zonaEditando) {
                <label class="font-semibold text-gray-800 w-44">Nuevo nombre</label>
            }
            <input
                [(ngModel)]="nombreZona"
                [disabled]="loading"
                [placeholder]="zonaEditando ? 'Editando zona' : 'Nueva zona'"
                class="w-full"
                pInputText
            >

            @if (zonaEditando) {
                <p-button
                    (onClick)="guardarZona()"
                    *hasPermission="Autoridades.ZONAS_EDITAR"
                    [loading]="loading"
                    label="Actualizar"
                />
                <p-button
                    (onClick)="cancelarEdicion()"
                    [disabled]="loading"
                    label="Cancelar"
                    severity="secondary"
                />
            }

            @if (!zonaEditando) {
                <p-button
                    (onClick)="guardarZona()"
                    *hasPermission="Autoridades.ZONAS_CREAR"
                    [loading]="loading"
                    label="Guardar"
                />
            }
        </div>
    </ng-template>

    <!-- Encabezado de columnas -->
    <ng-template #header>
        <tr>
            <th>Zona</th>
            <th class="w-32 text-center">Estatus</th>
            <th class="w-32 text-center">Acciones</th>
        </tr>
    </ng-template>

    <!-- Cuerpo de la tabla -->
    <ng-template #body let-zona>
        <tr>
            <!-- Nombre -->
            <td>
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 rounded-full {{ zona.activo ? 'bg-green-400' : 'bg-gray-400' }}"></div>
                    <span>{{ zona.nombre }}</span>
                </div>
            </td>

            <!-- Toggle -->
            <td class="text-center">
                <label
                    class="relative inline-flex items-center cursor-pointer select-none"
                    pTooltip="{{ zona.activo ? 'Zona activa' : 'Zona inactiva' }}"
                    tooltipPosition="top">
                    <input
                        (change)="toggleZonaActivo(zona)"
                        *hasPermission="Autoridades.ZONAS_EDITAR"
                        [checked]="zona.activo"
                        class="sr-only peer"
                        type="checkbox"
                    >
                    <div
                        class="w-11 h-6 bg-gray-300 rounded-full peer peer-checked:bg-green-500
                               after:content-[''] after:absolute after:top-0.5 after:left-[2px]
                               after:bg-white after:border-gray-300 after:border after:rounded-full
                               after:h-5 after:w-5 after:transition-all
                               peer-checked:after:translate-x-full peer-checked:after:border-white
                               transition-colors duration-200">
                    </div>
                </label>
            </td>

            <!-- Acciones -->
            <td class="text-center">
                <div class="flex justify-center gap-1">
                    <p-button
                        (onClick)="editarZona(zona)"
                        *hasPermission="Autoridades.ZONAS_EDITAR"
                        [outlined]="true"
                        icon="pi pi-pencil"
                        rounded
                        severity="info"
                        size="small"
                    ></p-button>
                    <p-button
                        (onClick)="eliminarZona(zona)"
                        *hasPermission="Autoridades.ZONAS_ELIMINAR"
                        [outlined]="true"
                        icon="pi pi-trash"
                        rounded
                        severity="danger"
                        size="small"
                    ></p-button>
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>
