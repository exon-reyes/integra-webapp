<p-dialog (onHide)="onCancel()" [(visible)]="visible" [closable]="true" [draggable]="false" [modal]="true"
          [resizable]="false" header="Editar Usuario" styleClass="w-full max-w-lg">

    <form (ngSubmit)="onSubmit()" [formGroup]="usuarioForm" class="flex flex-col gap-4">
        <!-- Usuario -->
        <div class="field">
            <label class="block text-sm font-medium text-gray-700 mb-1" for="username">
                Usuario
            </label>
            <input [class.ng-invalid]="usuarioForm.get('username')?.invalid && usuarioForm.get('username')?.touched" class="w-full" formControlName="username" id="username"
                   pInputText
                   placeholder="Ingrese el nombre de usuario"/>
            <small *ngIf="usuarioForm.get('username')?.invalid && usuarioForm.get('username')?.touched"
                   class="text-red-500 block mt-1">
                El usuario es requerido (mínimo 3 caracteres)
            </small>
        </div>

        <!-- Contraseña -->
        <div class="field">
            <label class="block text-sm font-medium text-gray-700 mb-1" for="password">
                Contraseña
                <span class="text-xs text-gray-500 font-normal ml-1">(Dejar en blanco para mantener actual)</span>
            </label>
            <p-password [class.ng-invalid]="usuarioForm.get('password')?.invalid && usuarioForm.get('password')?.touched" [feedback]="false" [toggleMask]="true"
                        formControlName="password" inputStyleClass="w-full" placeholder="Ingrese la contraseña"
                        class="w-full"/>
        </div>

        <!-- Colaborador -->
        <div class="field">
            <label class="block text-sm font-medium text-gray-700 mb-1" for="empl">Colaborador Asociado</label>
            <p-select [options]="empleados()" [showClear]="true" appendTo="body" class="w-full"
                      filter filterBy="codigoEmpleado,nombreCompleto" formControlName="idEmpleado"
                      optionValue="id" placeholder="Seleccione un colaborador (opcional)">
                <ng-template #item let-data>
                    {{ data.codigo }} - {{ data.nombreCompleto }}
                </ng-template>
                <ng-template #selectedItem let-data>
                    {{ data.codigo }} - {{ data.nombreCompleto }}
                </ng-template>
            </p-select>
        </div>

        <!-- Roles -->
        <div class="field">
            <label class="block text-sm font-medium text-gray-700 mb-1" for="rol">
                Roles <span class="text-red-500">*</span>
            </label>
            <p-multiSelect [class.ng-invalid]="usuarioForm.get('roles')?.invalid && usuarioForm.get('roles')?.touched" [loading]="loadingRoles()" [options]="roles()" appendTo="body"
                           class="w-full" formControlName="roles" optionLabel="nombre"
                           optionValue="id"
                           placeholder="Seleccione uno o más roles"/>
            <small *ngIf="usuarioForm.get('roles')?.invalid && usuarioForm.get('roles')?.touched"
                   class="text-red-500 block mt-1">
                Debe seleccionar al menos un rol
            </small>
        </div>
    </form>

    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-2">
            <p-button (onClick)="onCancel()" [disabled]="loading()" icon="pi pi-times" label="Cancelar"
                      severity="secondary"/>
            <p-button (onClick)="onSubmit()" [disabled]="usuarioForm.invalid" [loading]="loading()" icon="pi pi-check"
                      label="Actualizar Usuario" severity="success"/>
        </div>
    </ng-template>
</p-dialog>
