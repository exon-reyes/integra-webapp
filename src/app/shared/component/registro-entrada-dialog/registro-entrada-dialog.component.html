<p-dialog [(visible)]="visible" [breakpoints]="{ '960px': '75vw', '640px': '90vw' }" [draggable]="false" [modal]="true"
          [resizable]="false" [style]="{ width: '100%', maxWidth: '500px' }" header="Nuevo Registro">
    <article>
        <form (ngSubmit)="onSubmit()" [formGroup]="registroForm" class="space-y-4 md:space-y-5">
            <!-- SELECCIÓN DE UNIDAD -->
            <!--            <section>-->
            <!--                <label class="font-semibold text-slate-700 mb-2 block text-sm" for="unidad">Unidad</label>-->
            <!--                <p-select [filter]="true" [options]="unidades()" class="w-full" filterBy="nombreCompleto,clave"-->
            <!--                          formControlName="unidadId" optionLabel="nombreCompleto" optionValue="id"-->
            <!--                          placeholder="Seleccione unidad"/>-->
            <!--            </section>-->

            <!-- SELECCIÓN DE ACCIÓN -->
            <section>
                <label class="font-semibold text-slate-700 mb-3 block text-sm">Acción</label>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                    @for (tipo of tiposAccion(); track tipo.value) {
                        <button (click)="seleccionarAccion(tipo.value)" [ngClass]="accionSeleccionada() === tipo.value
                                    ? 'border-blue-300 bg-gray-100 shadow-sm'
                                    : 'border-slate-200 bg-white hover:border-blue-300'"
                                class="relative p-2 md:p-3 rounded-lg border-2 transition-all text-center"
                                type="button">
                            <div class="flex flex-col items-center gap-1.5 md:gap-2">
                                @if (tipo.svgIconName) {
                                    <i class="pi {{tipo.svgIconName}}" style="font-size: 2rem"></i>
                                }
                                <span class="text-xs md:text-sm font-bold text-slate-700 leading-tight">{{
                                        tipo.label
                                    }}</span>
                            </div>
                            @if (accionSeleccionada() === tipo.value) {
                                <i class="pi pi-check-circle text-blue-500 text-xs md:text-sm absolute top-1 right-1"></i>
                            }
                        </button>
                    }
                </div>
                <input formControlName="tipoAccion" type="hidden">
            </section>

            <!-- CAMPOS CONDICIONALES -->
            <section class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <!-- TIPO DE PAUSA (solo si es iniciar pausa) -->
                @if (mostrarTipoPausa()) {
                    <section>
                        <label class="font-semibold text-orange-900 mb-2 block text-sm">
                            <i class="pi pi-tag mr-1.5"></i> Tipo Pausa
                        </label>
                        <p-select [options]="tiposPausa()" class="w-full" formControlName="tipoPausa"
                                  optionLabel="label"
                                  optionValue="value" placeholder="Tipo"/>
                    </section>
                }

                <!-- PAUSA ACTIVA (solo si es finalizar pausa) -->
                @if (mostrarPausaActiva()) {
                    <section>
                        <label class="font-semibold text-orange-900 mb-2 block text-sm">
                            <i class="pi pi-info-circle mr-1.5"></i> Pausa Activa
                        </label>
                        <div
                            class="h-10 px-3 py-2 bg-orange-50 border border-orange-300 rounded-lg text-sm font-medium flex items-center">
                            {{ pausaActivaTexto() }}
                        </div>
                    </section>
                }

                <!-- JORNADA COMPLETA: HORA INICIO Y FIN -->
                @if (mostrarRegistroCompleto()) {
                    <section>
                        <label class="font-semibold text-red-900 mb-2 block text-sm" for="horaInicio">
                            <i class="pi pi-sign-in mr-1.5"></i> Hora Inicio <span class="text-red-500">*</span>
                        </label>
                        <input class="w-full" formControlName="horaInicio" id="horaInicio" pInputText type="time"/>
                    </section>

                    <section>
                        <label class="font-semibold text-red-900 mb-2 block text-sm" for="horaFin">
                            <i class="pi pi-sign-out mr-1.5"></i> Hora Fin <span class="text-red-500">*</span>
                            @if (esDiaSiguiente()) {
                                <span
                                    class="ml-2 inline-flex items-center rounded-md bg-blue-50 px-2 py-1 text-xs font-medium text-blue-700 ring-1 ring-inset ring-blue-700/10">Siguiente
                            día</span>
                            }
                        </label>
                        <input class="w-full" formControlName="horaFin" id="horaFin" pInputText type="time"/>
                    </section>
                }

                <!-- HORA SIMPLE (para otras acciones) -->
                @if (mostrarHoraSimple()) {
                    <section class="col-span-1 sm:col-span-2">
                        <label [ngClass]="esHoy() ? 'text-slate-700' : 'text-red-900'"
                               class="font-semibold mb-2 block text-sm" for="hora">
                            <i class="pi pi-clock mr-1.5"></i> Hora
                            @if (!esHoy()) {
                                <span class="text-red-500">*</span>
                            } @else {
                                <span class="text-xs text-slate-500 font-normal">(opcional)</span>
                            }
                        </label>
                        <input class="w-full" formControlName="hora" id="hora" pInputText type="time"/>
                    </section>
                }
            </section>

            <!-- OBSERVACIONES -->
            <section>
                <label class="font-semibold text-slate-700 mb-2 block text-sm" for="observaciones">
                    <i class="pi pi-comment mr-1.5"></i> Comentario
                </label>
                <textarea class="w-full px-3 py-2 border rounded-lg resize-none text-sm" formControlName="observaciones"
                          id="observaciones" pTextarea rows="2"></textarea>
            </section>

            <!-- BOTÓN DE ENVÍO -->
            <p-button [disabled]="isLoading() || !empleado()" [loading]="isLoading()" icon="pi pi-check"
                      label="Confirmar Registro"
                      styleClass="w-full h-11 text-sm font-bold" type="submit"/>
        </form>
    </article>
</p-dialog>
