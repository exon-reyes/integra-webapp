<div class="w-full mx-auto bg-white rounded-xl border border-slate-200">
    <!-- Header con mes/año y controles -->
    <div class="flex items-center justify-between p-5">
        <div class="flex flex-col">
            <div class="text-[11px] font-semibold  text-sky-600">
                {{ displayDate().getFullYear() }}
            </div>
            <div class="text-[13px] font-bold text-slate-800 leading-tight">
                {{ monthNames[displayDate().getMonth()] }}
            </div>
        </div>
        <div class="flex items-center gap-1 bg-slate-50 p-1 rounded-xl border border-slate-100">
            <button (click)="changeMonth(-1)"
                    class="p-2 hover:bg-white hover:shadow-sm rounded-lg text-slate-400 hover:text-blue-600 transition-all active:scale-90"
                    type="button">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"></path>
                </svg>
            </button>
            <button (click)="changeMonth(1)"
                    class="p-2 hover:bg-white hover:shadow-sm rounded-lg text-slate-400 hover:text-blue-600 transition-all active:scale-90"
                    type="button">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"></path>
                </svg>
            </button>
        </div>
    </div>
    <!-- Días de la semana -->
    <div class="px-4 pb-5">
        <div class="grid grid-cols-7 mb-2">
            @for (dayName of daysOfWeek; track dayName) {
                <div class="text-[10px] font-bold text-slate-400 uppercase text-center py-2">
                    {{ dayName }}
                </div>
            }
        </div>
        <!-- Grid de días -->
        <div class="grid grid-cols-7 gap-1">
            @for (day of daysInMonth(); track $index) {
                <div class="aspect-square flex items-center justify-center">
                    @if (day) {
                        <button (click)="selectDay(day)"
                                [disabled]="isDayDisabled(day)"
                                [class]="getDayClasses(day)"
                                class="relative w-full h-full max-w-[40px] max-h-[40px] flex items-center justify-center text-sm transition-all outline-none focus-visible:ring-2 focus-visible:ring-blue-400"
                                type="button">
                            {{ day }}

                            <!-- Indicador de día con registro -->
                            @if (isDayTagged(day)) {
                                <span class="absolute top-0 right-0 flex h-2 w-2">
                  <span [class.bg-white]="todayInView() === day"
                        [class.tag-corner]="todayInView() !== day"
                        class="relative inline-flex rounded-full h-1.5 w-1.5">
                  </span>
                </span>
                            }
                            <!-- Indicador de día sin registro -->
                            @if (isDayMissingRecord(day)) {
                                <span class="absolute top-0 right-0 flex h-2 w-2">
                  <span class="tag-corner-red relative inline-flex rounded-full h-1.5 w-1.5"></span>
                </span>
                            }
                        </button>
                    }
                </div>
            }
        </div>
    </div>
    <!-- Leyenda de indicadores -->
    @if (showRegisterIndicator()) {
        <div class="flex items-center gap-4 mb-3 border-t border-slate-50 pt-3">
            <div class="flex items-center gap-1.5 ml-5">
                <div class="h-1.5 w-1.5 bg-emerald-500 rounded-full"></div>
                <span class="italic text-[11px] text-slate-500">Con registro</span>
            </div>
            <div class="flex items-center gap-1.5">
                <div class="h-1.5 w-1.5 bg-red-500 rounded-full"></div>
                <span class="italic text-[11px] text-slate-500">Sin registro</span>
            </div>
        </div>
    }
</div>
